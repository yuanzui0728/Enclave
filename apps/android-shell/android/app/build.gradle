apply plugin: 'com.android.application'

def signingProperties = new Properties()
def signingPropertiesFile = file('../../android-signing.local.properties')
if (signingPropertiesFile.exists()) {
    signingProperties.load(new FileInputStream(signingPropertiesFile))
}

def envSigningStoreFile = System.getenv('YINJIE_UPLOAD_STORE_FILE')
def envSigningStorePassword = System.getenv('YINJIE_UPLOAD_STORE_PASSWORD')
def envSigningKeyAlias = System.getenv('YINJIE_UPLOAD_KEY_ALIAS')
def envSigningKeyPassword = System.getenv('YINJIE_UPLOAD_KEY_PASSWORD')

def signingStoreFile = signingProperties['YINJIE_UPLOAD_STORE_FILE'] ?: envSigningStoreFile
def signingStorePassword = signingProperties['YINJIE_UPLOAD_STORE_PASSWORD'] ?: envSigningStorePassword
def signingKeyAlias = signingProperties['YINJIE_UPLOAD_KEY_ALIAS'] ?: envSigningKeyAlias
def signingKeyPassword = signingProperties['YINJIE_UPLOAD_KEY_PASSWORD'] ?: envSigningKeyPassword

def hasReleaseSigning =
    signingStoreFile &&
    signingStorePassword &&
    signingKeyAlias &&
    signingKeyPassword

android {
    namespace "com.yinjie.mobile"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.yinjie.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(signingStoreFile)
                storePassword signingStorePassword
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
            shrinkResources true
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation "com.google.firebase:firebase-messaging:24.1.0"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
